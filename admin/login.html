<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login – IETE Student Forum KEC</title>
  <link rel="stylesheet" href="../assets/css/variables.css" />
  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />
  <link rel="stylesheet" href="../assets/css/admin.css" />
  <style>
    /* ── Login-specific styles ── */
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--color-primary-dark) 0%, var(--color-primary) 50%, var(--color-primary-light) 100%);
      padding: var(--space-6);
      position: relative;
      overflow: hidden;
    }

    .login-page::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(244,163,0,0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(244,163,0,0.05) 0%, transparent 60%);
      pointer-events: none;
    }

    .login-card {
      background: #fff;
      border-radius: var(--radius-2xl);
      box-shadow: 0 32px 64px rgba(0,0,0,0.25);
      padding: var(--space-10) var(--space-8);
      width: 100%;
      max-width: 440px;
      position: relative;
      z-index: 1;
      animation: loginCardIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    @keyframes loginCardIn {
      from { opacity: 0; transform: translateY(30px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .login-logos {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-5);
      margin-bottom: var(--space-6);
    }

    .login-logos img {
      height: 56px;
      width: auto;
      object-fit: contain;
    }

    .login-logos__divider {
      width: 1px;
      height: 40px;
      background: var(--color-border);
    }

    .login-heading {
      text-align: center;
      margin-bottom: var(--space-8);
    }

    .login-heading h1 {
      font-family: var(--font-heading);
      font-size: var(--text-xl);
      font-weight: var(--font-bold);
      color: var(--color-primary);
      margin: 0 0 var(--space-1);
    }

    .login-heading p {
      font-size: var(--text-sm);
      color: var(--color-text-muted);
      margin: 0;
    }

    .login-form .form-group {
      margin-bottom: var(--space-5);
    }

    .login-form label {
      display: block;
      font-size: var(--text-sm);
      font-weight: var(--font-semibold);
      color: var(--color-text);
      margin-bottom: var(--space-2);
    }

    .login-form input {
      width: 100%;
      padding: 0.75rem var(--space-4);
      border: 1.5px solid var(--color-border);
      border-radius: var(--radius-lg);
      font-size: var(--text-sm);
      font-family: var(--font-body);
      color: var(--color-text);
      background: var(--color-bg-alt);
      transition: border-color var(--transition-base), box-shadow var(--transition-base);
      box-sizing: border-box;
    }

    .login-form input:focus {
      outline: none;
      border-color: var(--color-primary);
      background: #fff;
      box-shadow: 0 0 0 3px var(--color-primary-100);
    }

    .login-form input.error {
      border-color: var(--color-danger);
      box-shadow: 0 0 0 3px var(--color-danger-light);
    }

    .login-error {
      display: none;
      background: var(--color-danger-light);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: var(--radius-lg);
      padding: var(--space-3) var(--space-4);
      color: var(--color-danger);
      font-size: var(--text-sm);
      font-weight: var(--font-medium);
      margin-bottom: var(--space-5);
      align-items: center;
      gap: var(--space-2);
    }

    .login-error.show {
      display: flex;
    }

    .login-btn {
      width: 100%;
      padding: 0.85rem;
      background: var(--color-primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-lg);
      font-size: var(--text-base);
      font-family: var(--font-heading);
      font-weight: var(--font-semibold);
      cursor: pointer;
      transition: all var(--transition-base);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      position: relative;
    }

    .login-btn:hover:not(:disabled) {
      background: var(--color-primary-dark);
      box-shadow: var(--shadow-primary);
      transform: translateY(-1px);
    }

    .login-btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
    }

    .login-btn .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    .login-btn.loading .spinner { display: block; }
    .login-btn.loading .btn-text { display: none; }

    @keyframes spin { to { transform: rotate(360deg); } }

    .login-footer {
      text-align: center;
      margin-top: var(--space-6);
      font-size: var(--text-xs);
      color: var(--color-text-muted);
    }

    .login-footer a {
      color: var(--color-primary);
      text-decoration: none;
      font-weight: var(--font-medium);
    }

    .login-footer a:hover { text-decoration: underline; }

    .login-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--color-secondary-100);
      color: var(--color-secondary-dark);
      border-radius: var(--radius-full);
      padding: 4px 12px;
      font-size: var(--text-xs);
      font-weight: var(--font-semibold);
      margin: 0 auto var(--space-4);
      display: flex;
      justify-content: center;
    }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <!-- Logos -->
      <div class="login-logos">
        <img src="../assets/images/kec-logo.jpg" alt="KEC Logo" onerror="this.style.display='none'" />
        <div class="login-logos__divider"></div>
        <img src="../assets/images/iete-logo.png" alt="IETE Logo" onerror="this.style.display='none'" />
      </div>

      <!-- Heading -->
      <div class="login-heading">
        <div class="login-badge">🔒 Secure Admin Portal</div>
        <h1>IETE Admin Dashboard</h1>
        <p>Kongu Engineering College · Student Forum</p>
      </div>

      <!-- Error Message -->
      <div class="login-error" id="login-error" role="alert">
        <span>⚠</span>
        <span id="login-error-text">Invalid email or password.</span>
      </div>

      <!-- Form -->
      <form class="login-form" id="login-form" novalidate>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="admin@kec.edu.in"
            required
            autocomplete="email"
          />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            required
            autocomplete="current-password"
          />
        </div>

        <button type="submit" class="login-btn" id="login-btn">
          <div class="spinner"></div>
          <span class="btn-text">Sign In →</span>
        </button>
      </form>

      <div class="login-footer">
        <a href="../index.html">← Back to Public Site</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module">
    import { login, getSession } from '../assets/js/auth.js';
    import { showToast } from '../assets/js/animations.js';

    // Redirect if already logged in
    (async () => {
      const session = await getSession();
      if (session) {
        window.location.href = 'dashboard.html';
      }
    })();

    const form    = document.getElementById('login-form');
    const btn     = document.getElementById('login-btn');
    const errBox  = document.getElementById('login-error');
    const errText = document.getElementById('login-error-text');
    const emailIn = document.getElementById('email');
    const passIn  = document.getElementById('password');

    function showError(msg) {
      errText.textContent = msg;
      errBox.classList.add('show');
      emailIn.classList.add('error');
      passIn.classList.add('error');
    }

    function clearError() {
      errBox.classList.remove('show');
      emailIn.classList.remove('error');
      passIn.classList.remove('error');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearError();

      const email    = emailIn.value.trim();
      const password = passIn.value;

      if (!email || !password) {
        showError('Please enter both email and password.');
        return;
      }

      btn.classList.add('loading');
      btn.disabled = true;

      const { user, error } = await login(email, password);

      btn.classList.remove('loading');
      btn.disabled = false;

      if (error || !user) {
        showError(error?.message || 'Login failed. Please check your credentials.');
        passIn.value = '';
      } else {
        showToast('Login successful! Redirecting…', 'success', 1500);
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
      }
    });

    // Clear errors on input
    [emailIn, passIn].forEach(el => el.addEventListener('input', clearError));
  </script>
</body>
</html>
